name: CI

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run db:generate --workspace=@internhunter/api

      - name: Typecheck API
        run: npm run build --workspace=@internhunter/api

      - name: Typecheck Web
        run: npx tsc --noEmit -p apps/web

      - name: Run E2E Smoke Test
        run: ./scripts/smoke-test.sh
        env:
          DATABASE_URL: postgresql://internhunter:internhunter_secret@localhost:5432/internhunter?schema=public
          # Note: We use localhost:5432 because docker-compose exposes postgres on 5432 to the host.
